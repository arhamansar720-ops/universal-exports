<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" width="200" height="200">
  <defs>
    <!-- Globe clip -->
    <clipPath id="gc"><circle cx="100" cy="100" r="67"/></clipPath>
    <!-- Top-half clip (above centre band) -->
    <clipPath id="th"><rect x="0" y="0" width="200" height="100"/></clipPath>
    <!-- Bottom-half clip (below centre band) -->
    <clipPath id="bh"><rect x="0" y="100" width="200" height="100"/></clipPath>
    <!-- Arc for top text -->
    <path id="ta" d="M 17 100 A 83 83 0 0 1 183 100"/>
    <!-- Arc for bottom text -->
    <path id="ba" d="M 24 118 A 83 83 0 0 0 176 118"/>

    <!-- Rope gradient -->
    <linearGradient id="rope" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#F0D06A"/>
      <stop offset="30%"  stop-color="#8B6914"/>
      <stop offset="60%"  stop-color="#CDAA3E"/>
      <stop offset="100%" stop-color="#7A5C10"/>
    </linearGradient>
  </defs>

  <!-- ①  Outer black background -->
  <circle cx="100" cy="100" r="100" fill="#0A0B12"/>

  <!-- ②  Rope border – layered rings to simulate twisted cord -->
  <circle cx="100" cy="100" r="96" fill="none" stroke="#C8A020" stroke-width="1.5"/>
  <circle cx="100" cy="100" r="94" fill="none" stroke="#7A5C10" stroke-width="10"/>
  <circle cx="100" cy="100" r="94" fill="none" stroke="#E8C84A" stroke-width="3"  stroke-dasharray="7 7"/>
  <circle cx="100" cy="100" r="94" fill="none" stroke="#8B6914" stroke-width="2"  stroke-dasharray="7 7" stroke-dashoffset="7"/>
  <circle cx="100" cy="100" r="89" fill="none" stroke="#C8A020" stroke-width="1.5"/>
  <circle cx="100" cy="100" r="88" fill="none" stroke="#6A4E0E" stroke-width="1"/>

  <!-- ③  Black text ring -->
  <circle cx="100" cy="100" r="86" fill="#0A0B12"/>

  <!-- ④  "PAKISTAN CHAMBER OF COMMERCE & TRADE" — top arc -->
  <text font-size="8" fill="white" font-family="Arial,Helvetica,sans-serif" font-weight="bold" letter-spacing="1.4">
    <textPath href="#ta" startOffset="1%">PAKISTAN CHAMBER OF COMMERCE &amp; TRADE</textPath>
  </text>

  <!-- ⑤  "★ USA ★" — bottom arc -->
  <text font-size="9" fill="white" font-family="Arial,Helvetica,sans-serif" font-weight="bold" letter-spacing="4">
    <textPath href="#ba" startOffset="22%">★  USA  ★</textPath>
  </text>

  <!-- ⑥  Gold inner separator ring -->
  <circle cx="100" cy="100" r="71" fill="none" stroke="#C8A020" stroke-width="3"/>

  <!-- ⑦  Globe base (dark blue-grey sphere feel) -->
  <circle cx="100" cy="100" r="68" fill="#1B2235"/>

  <!-- ⑧  Globe grid lines (meridians + parallels) -->
  <g stroke="#2E3D5A" stroke-width="0.8" fill="none" clip-path="url(#gc)">
    <line x1="32" y1="100" x2="168" y2="100"/>
    <line x1="100" y1="32" x2="100" y2="168"/>
    <ellipse cx="100" cy="100" rx="68" ry="23"/>
    <ellipse cx="100" cy="100" rx="68" ry="45"/>
    <ellipse cx="100" cy="100" rx="23" ry="68"/>
    <ellipse cx="100" cy="100" rx="45" ry="68"/>
    <ellipse cx="100" cy="100" rx="60" ry="68"/>
    <ellipse cx="100" cy="100" rx="68" ry="60"/>
    <ellipse cx="100" cy="100" rx="35" ry="68"/>
    <ellipse cx="100" cy="100" rx="68" ry="35"/>
  </g>

  <!-- ⑨  US FLAG — top half of globe -->
  <g clip-path="url(#gc)">
    <g clip-path="url(#th)">
      <!-- Red base -->
      <rect x="32" y="32" width="136" height="68" fill="#B22234"/>
      <!-- White stripes -->
      <rect x="32" y="38" width="136" height="5.5" fill="white"/>
      <rect x="32" y="49" width="136" height="5.5" fill="white"/>
      <rect x="32" y="60" width="136" height="5.5" fill="white"/>
      <rect x="32" y="71" width="136" height="5.5" fill="white"/>
      <rect x="32" y="82" width="136" height="5.5" fill="white"/>
      <rect x="32" y="93" width="136" height="5.5" fill="white"/>
      <!-- Blue canton -->
      <rect x="32" y="32" width="55" height="42" fill="#3C3B6E"/>
      <!-- Stars (6 rows alternating 6/5) -->
      <g fill="white">
        <!-- Row 1: 6 stars -->
        <circle cx="37" cy="37" r="1.7"/><circle cx="44" cy="37" r="1.7"/><circle cx="51" cy="37" r="1.7"/>
        <circle cx="58" cy="37" r="1.7"/><circle cx="65" cy="37" r="1.7"/><circle cx="72" cy="37" r="1.7"/>
        <!-- Row 2: 5 stars (offset) -->
        <circle cx="40.5" cy="42" r="1.7"/><circle cx="47.5" cy="42" r="1.7"/><circle cx="54.5" cy="42" r="1.7"/>
        <circle cx="61.5" cy="42" r="1.7"/><circle cx="68.5" cy="42" r="1.7"/>
        <!-- Row 3: 6 stars -->
        <circle cx="37" cy="47" r="1.7"/><circle cx="44" cy="47" r="1.7"/><circle cx="51" cy="47" r="1.7"/>
        <circle cx="58" cy="47" r="1.7"/><circle cx="65" cy="47" r="1.7"/><circle cx="72" cy="47" r="1.7"/>
        <!-- Row 4: 5 stars -->
        <circle cx="40.5" cy="52" r="1.7"/><circle cx="47.5" cy="52" r="1.7"/><circle cx="54.5" cy="52" r="1.7"/>
        <circle cx="61.5" cy="52" r="1.7"/><circle cx="68.5" cy="52" r="1.7"/>
        <!-- Row 5: 6 stars -->
        <circle cx="37" cy="57" r="1.7"/><circle cx="44" cy="57" r="1.7"/><circle cx="51" cy="57" r="1.7"/>
        <circle cx="58" cy="57" r="1.7"/><circle cx="65" cy="57" r="1.7"/><circle cx="72" cy="57" r="1.7"/>
        <!-- Row 6: 5 stars -->
        <circle cx="40.5" cy="62" r="1.7"/><circle cx="47.5" cy="62" r="1.7"/><circle cx="54.5" cy="62" r="1.7"/>
        <circle cx="61.5" cy="62" r="1.7"/><circle cx="68.5" cy="62" r="1.7"/>
        <!-- Row 7: 6 stars -->
        <circle cx="37" cy="67" r="1.7"/><circle cx="44" cy="67" r="1.7"/><circle cx="51" cy="67" r="1.7"/>
        <circle cx="58" cy="67" r="1.7"/><circle cx="65" cy="67" r="1.7"/><circle cx="72" cy="67" r="1.7"/>
      </g>
    </g>
  </g>

  <!-- ⑩  PAKISTAN FLAG — bottom half of globe -->
  <g clip-path="url(#gc)">
    <g clip-path="url(#bh)">
      <!-- Green base -->
      <rect x="32" y="100" width="136" height="68" fill="#01411C"/>
      <!-- White fess (left vertical stripe) -->
      <rect x="32" y="100" width="34" height="68" fill="white"/>
      <!-- Crescent (white circle minus offset circle = crescent) -->
      <circle cx="110" cy="134" r="17" fill="white"/>
      <circle cx="119" cy="130" r="13.5" fill="#01411C"/>
      <!-- 5-pointed star -->
      <polygon
        points="130,120 132.8,129 142,129 134.6,134.5 137.4,143.5 130,138 122.6,143.5 125.4,134.5 118,129 127.2,129"
        fill="white"/>
    </g>
  </g>

  <!-- ⑪  Black centre band (banner) -->
  <rect x="32" y="88" width="136" height="24" fill="#000000"/>

  <!-- ⑫  "PCC&T - USA" gold text -->
  <text
    x="100" y="105"
    text-anchor="middle"
    fill="#C8A020"
    font-size="17"
    font-weight="900"
    font-family="'Arial Black',Arial,Helvetica,sans-serif"
    letter-spacing="0.5">PCC&amp;T - USA</text>

  <!-- ⑬  Gold ring redrawn on top to clean up edges -->
  <circle cx="100" cy="100" r="68" fill="none" stroke="#C8A020" stroke-width="2"/>
</svg>
